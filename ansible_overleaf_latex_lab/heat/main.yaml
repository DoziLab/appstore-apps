heat_template_version: 2018-08-31

description: >
  DoziLab Overleaf LaTeX Lab VM.
  Nur Infrastruktur — keine user_data, keine cloud-init.
  Konfiguration übernimmt Ansible vom Backend aus per SSH.
  Root disk is provisioned as a Cinder volume (Boot from Volume) so "Speicher" can be configured.

parameters:
  image:
    type: string
    default: "Ubuntu 24.04 2025-01"
    constraints:
      - allowed_values:
          - "Ubuntu 22.04 2025-01"
          - "Ubuntu 24.04 2025-01"

    description: "Base image for the VM."

  flavor:
    type: string
    default: "gp1.medium"
    constraints:
      - allowed_values:
          - "gp1.small"
          - "gp1.medium"
    description: "VM size for Overleaf."

  volume_size:
    type: number
    default: 32
    constraints:
      - range: { min: 16, max: 200 }
    description: "Root volume size in GB."

  ssh_cidr:
    type: string
    default: "141.72.0.0/16"
    constraints:
      - allowed_pattern: '^(\d{1,3}\.){3}\d{1,3}/\d{1,2}$'
    description: "IPv4 CIDR allowed to access SSH, HTTP and ICMP."

  stack_label:
    type: string
    default: "latex"
    constraints:
      - allowed_pattern: '^[a-z0-9][a-z0-9-]{0,30}$'
    description: "Internal label used for resource names/metadata."

  network:
    type: string
    default: "NAT"
    constraints:
      - allowed_values: ["NAT"]

  external_network:
    type: string
    default: "DHBW"
    constraints:
      - allowed_values: ["DHBW"]

  key_name:
    type: string
    description: "Admin/support SSH keypair. Backend should set this from ANSIBLE_SSH_KEY_NAME."

resources:
  secgroup:
    type: OS::Neutron::SecurityGroup
    properties:
      description: SSH + HTTP + ICMP aus erlaubtem CIDR
      rules:
        - direction: ingress
          ethertype: IPv4
          protocol: tcp
          port_range_min: 22
          port_range_max: 22
          remote_ip_prefix: { get_param: ssh_cidr }

        - direction: ingress
          ethertype: IPv4
          protocol: tcp
          port_range_min: 80
          port_range_max: 80
          remote_ip_prefix: { get_param: ssh_cidr }

        - direction: ingress
          ethertype: IPv4
          protocol: icmp
          remote_ip_prefix: { get_param: ssh_cidr }

  port:
    type: OS::Neutron::Port
    properties:
      network: { get_param: network }
      security_groups:
        - { get_resource: secgroup }

  root_volume:
    type: OS::Cinder::Volume
    properties:
      name:
        str_replace:
          template: "dozilab-STACK-root"
          params:
            STACK: { get_param: stack_label }
      size: { get_param: volume_size }
      image: { get_param: image }
      metadata:
        dozilab_stack_label: { get_param: stack_label }

  server:
    type: OS::Nova::Server
    properties:
      name:
        str_replace:
          template: "dozilab-STACK"
          params:
            STACK: { get_param: stack_label }

      flavor: { get_param: flavor }
      key_name: { get_param: key_name }

      block_device_mapping_v2:
        - boot_index: 0
          volume_id: { get_resource: root_volume }
          delete_on_termination: true

      networks:
        - port: { get_resource: port }

      metadata:
        dozilab_stack_label: { get_param: stack_label }
        dozilab_config_method: "ansible"
        dozilab_app: "overleaf-latex-lab"

  fip:
    type: OS::Neutron::FloatingIP
    properties:
      floating_network: { get_param: external_network }

  fip_assoc:
    type: OS::Neutron::FloatingIPAssociation
    properties:
      floatingip_id: { get_resource: fip }
      port_id: { get_resource: port }

outputs:
  floating_ip:
    description: "Public floating IP address."
    value: { get_attr: [fip, floating_ip_address] }

  server_id:
    description: "Nova server ID."
    value: { get_resource: server }

  ssh_hint:
    description: "Teacher login: ssh <teacher>@<floating_ip>"
    value:
      str_replace:
        template: "ssh <teacher>@FIP"
        params:
          FIP: { get_attr: [fip, floating_ip_address] }

  overleaf_url:
    description: "Overleaf web URL."
    value:
      str_replace:
        template: "http://FIP"
        params:
          FIP: { get_attr: [fip, floating_ip_address] }

  overleaf_launchpad_url:
    description: "Overleaf first admin setup URL."
    value:
      str_replace:
        template: "http://FIP/launchpad"
        params:
          FIP: { get_attr: [fip, floating_ip_address] }

  root_volume_id:
    description: "Cinder root volume ID."
    value: { get_resource: root_volume }