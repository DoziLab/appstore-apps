app:
  name: overleaf-latex-lab
  label: Overleaf LaTeX Lab
  version: 1.0.0
  description: >
    Ubuntu VM mit selbst gehosteter Overleaf Community Edition für kollaboratives
    LaTeX-Arbeiten im Browser. Die Installation erfolgt über das offizielle
    Overleaf Toolkit mit Docker Compose. Root disk is a Cinder volume
    (Boot from Volume) so "Speicher" can be configured.
  owner_team: dozilab-app-team

  allow_user_files: true

# Maps each role-bearing file in this folder to its FileType so the backend's
# GitHub-import wiring picks them up at deploy time.
artifacts:
  heat_template:    heat/main.yaml
  ansible_playbook: playbooks/main.yml
  shell_scripts:
    - scripts/check_overleaf_setup.sh
  config_files:
    - files/welcome.tex
    - files/motd

parameters:
  - name: stack_label
    label: Stack-Label
    step: template
    type: string
    default: latex
    required: true
    description: >
      Kurzes Label für diesen Stack (z.B. latex-ws2026).
      Muss passen zu: ^[a-z0-9][a-z0-9-]{0,30}$

  - name: image
    label: Betriebssystem-Image
    step: konfiguration
    type: string
    default: "Ubuntu 24.04 2026-01"
    required: true
    enum:
      - "Ubuntu 22.04 2025-01"
      - "Ubuntu 24.04 2025-01"
      - "Ubuntu 24.04 2026-01"

  - name: flavor
    label: VM-Größe (Flavor)
    step: konfiguration
    type: string
    default: "gp1.medium"
    required: true
    enum:
      - "gp1.small"
      - "gp1.medium"

  - name: volume_size
    label: Speicher (GB)
    step: konfiguration
    type: number
    default: 32
    enum:
      - 16
      - 32
      - 64
      - 128
    required: true
    description: "Größe der Root-Disk als Cinder-Volume (Boot from Volume)."

  - name: ssh_cidr
    label: Zugriff (CIDR)
    step: netzwerk
    type: string
    default: "141.72.0.0/16"
    required: true
    description: >
      Nur dieses Netz darf per SSH, HTTP und ICMP auf die VM zugreifen.
      Standard: DHBW/VPN. Beispiel: 141.72.0.0/16 oder 1.2.3.4/32.

  - name: overleaf_site_name
    label: Overleaf Seitenname
    step: konfiguration
    type: string
    default: "DoziLab Overleaf"
    required: true
    description: "Anzeigename der lokalen Overleaf-Instanz."

  - name: overleaf_admin_email
    label: Overleaf Admin E-Mail
    step: zugriff
    type: string
    default: "admin@dozilab.local"
    required: true
    description: >
      E-Mail-Adresse für den Admin-Account. Wenn die Account-Automatisierung
      aktiv ist, wird der Account per Overleaf CLI vorbereitet und der
      Passwort-Setup-Link auf der VM abgelegt.

  - name: create_overleaf_users
    label: Overleaf-Accounts automatisch vorbereiten
    step: zugriff
    type: boolean
    default: true
    required: true
    description: >
      Erstellt den Admin-Account und, falls Gruppen übergeben werden,
      Gruppen-Accounts per Overleaf CLI. Passwörter werden nicht fest gesetzt,
      sondern über Setup-Links initial vergeben.

  - name: overleaf_user_domain
    label: Overleaf Benutzer-Domain
    step: zugriff
    type: string
    default: "dozilab.local"
    required: true
    description: >
      Domain für automatisch erzeugte Gruppen-Accounts, falls das Backend keine
      E-Mail-Adresse mitgibt. Beispiel: gruppe01@dozilab.local

  - name: network
    label: Internes Netzwerk
    step: netzwerk
    type: string
    default: "NAT"
    hidden: true
    description: "Internal network (fixed)."

  - name: external_network
    label: Externes Netzwerk (Floating IP)
    step: netzwerk
    type: string
    default: "DHBW"
    hidden: true
    description: "External/FloatingIP network (fixed)."

credentials:
  per_group:
    - overleaf:
        email: "{{ username }}@dozilab.local"

  teacher:
    # teacher.linux automatisch vorhanden — kein Eintrag nötig

user_files:
  - name:        latex_vorlage
    label:       "LaTeX Vorlage"
    description: "Optionale LaTeX-Vorlage, die auf der VM unter /opt/dozilab/latex/template.tex abgelegt wird."
    required:    false
    accept:      "*.tex"
    destination: /opt/dozilab/user-files/template.tex
    mode:        all_stacks

  - name:        material
    label:       "Materialien"
    description: "Optionale Materialien für die LaTeX-Übung."
    required:    false
    accept:      "*"
    destination: /opt/dozilab/user-files/material
    mode:        all_stacks

outputs:
  - name: floating_ip
    label: Floating IP
    from_heat_output: floating_ip

  - name: server_id
    label: Server ID
    from_heat_output: server_id

  - name: ssh_hint
    label: SSH Hinweis
    from_heat_output: ssh_hint

  - name: overleaf_url
    label: Overleaf URL
    from_heat_output: overleaf_url

  - name: overleaf_launchpad_url
    label: Overleaf Admin Setup
    from_heat_output: overleaf_launchpad_url

  - name: root_volume_id
    label: Root Volume ID
    from_heat_output: root_volume_id
