app:
  name: owasp-juice-shop-lab
  label: OWASP Juice Shop Lab
  version: 2.0.0
  description: >
    Deploys isolated OWASP Juice Shop instances for web security courses.
    Each course group gets its own container and Basic Auth credentials.
    Infrastructure is created by Heat, configuration runs via Ansible.
  owner_team: dozilab-app-team

artifacts:
  heat_template:    heat/main.yaml
  ansible_playbook: playbooks/main.yml

parameters:
  - name: stack_label
    label: Stack-Label
    step: template
    type: string
    default: juice
    required: true
    description: >
      Kurzes Label fuer VM-Namen und Metadaten, z.B. juice-ws2026.
      Muss passen zu: ^[a-z0-9][a-z0-9-]{0,30}$

  - name: image
    label: Betriebssystem-Image
    step: konfiguration
    type: string
    default: "Ubuntu 22.04 2025-01"
    required: true
    enum:
      - "Ubuntu 22.04 2025-01"
      - "Ubuntu 24.04 2025-01"
      - "Ubuntu 24.04 2026-01"

  - name: flavor
    label: VM-Groesse (Flavor)
    step: konfiguration
    type: string
    default: "gp1.small"
    required: true
    enum:
      - "gp1.small"
      - "gp1.medium"
    description: >
      gp1.small reicht fuer wenige Gruppen. Fuer mehrere parallele Juice-Shop-
      Container ist gp1.medium sinnvoll.

  - name: volume_size
    label: Speicher (GB)
    step: konfiguration
    type: number
    default: 16
    enum:
      - 16
      - 32
      - 64
      - 128
    required: true
    description: "Groesse der Root-Disk als Cinder-Volume (Boot from Volume)."

  - name: ssh_cidr
    label: SSH erlaubtes Netz (CIDR)
    step: netzwerk
    type: string
    default: "141.72.0.0/16"
    required: true
    description: "CIDR allowed to SSH."

  - name: web_cidr
    label: Web erlaubtes Netz (CIDR)
    step: netzwerk
    type: string
    default: "141.72.0.0/16"
    required: true
    description: "CIDR allowed to open the Juice Shop web UI."

  - name: juice_shop_image
    label: Juice-Shop Docker Image
    step: konfiguration
    type: string
    default: "bkimminich/juice-shop:latest"
    required: true
    description: "Docker-Image fuer die Gruppen-Instanzen."

  - name: max_group_instances
    label: Maximale Gruppeninstanzen
    step: konfiguration
    type: number
    default: 50
    enum:
      - 10
      - 25
      - 50
      - 100
    required: true
    description: >
      Sicherheitslimit fuer die Anzahl parallel gestarteter Juice-Shop-
      Container auf dieser VM.

  - name: network
    label: Internes Netzwerk
    step: netzwerk
    type: string
    default: "NAT"
    hidden: true
    description: "Internal network."

  - name: external_network
    label: Externes Netzwerk
    step: netzwerk
    type: string
    default: "DHBW"
    hidden: true
    description: "Network used for Floating IPs."

credentials:
  per_group:
    - juice_shop:
        username: "{{ username }}"
        password: generate

  teacher:
    - juice_shop:
        username: "{{ username }}"
        password: generate

outputs:
  - name: ssh_user
    label: SSH User
    from_heat_output: ssh_user

  - name: floating_ip
    label: Floating IP
    from_heat_output: floating_ip

  - name: private_ip
    label: Private IP
    from_heat_output: private_ip

  - name: server_id
    label: Server ID
    from_heat_output: server_id

  - name: web_url
    label: Gruppen-Uebersicht
    from_heat_output: web_url

  - name: ssh_hint
    label: SSH Hinweis
    from_heat_output: ssh_hint

  - name: root_volume_id
    label: Root Volume ID
    from_heat_output: root_volume_id
