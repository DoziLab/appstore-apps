---
- name: DoziLab Static Website Lab Setup
  hosts: all
  remote_user: ubuntu
  become: true

  vars:
    dozilab_mark_dir: /var/lib/dozilab
    dozilab_site_root: /var/www/html
    dozilab_app_name: ansible-static-website-lab

  tasks:
    - name: DoziLab Verzeichnisse erstellen
      file:
        path: "{{ item.path }}"
        state: directory
        owner: root
        group: root
        mode: "{{ item.mode }}"
      loop:
        - { path: "{{ dozilab_mark_dir }}", mode: "0755" }
        - { path: "{{ dozilab_site_root }}", mode: "0755" }

    - name: Nginx installieren
      apt:
        name: nginx
        state: present
        update_cache: true
        cache_valid_time: 3600

    - name: Standard-Webseite schreiben
      copy:
        dest: "{{ dozilab_site_root }}/index.html"
        owner: www-data
        group: www-data
        mode: "0644"
        content: |
          <!doctype html>
          <html lang="de">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Webserver Uebung</title>
            <style>
              :root {
                color-scheme: light;
                font-family: Arial, Helvetica, sans-serif;
                background: #f6f6f3;
                color: #20242a;
              }
              body {
                margin: 0;
                min-height: 100vh;
              }
              main {
                width: min(860px, calc(100% - 40px));
                margin: 72px auto;
                background: #ffffff;
                border: 1px solid #d9d9d3;
                padding: 34px;
              }
              h1 {
                margin: 0 0 10px;
                font-size: 30px;
                line-height: 1.2;
              }
              p {
                max-width: 680px;
                margin: 0 0 16px;
                font-size: 16px;
                line-height: 1.55;
              }
              ul {
                margin: 18px 0 0;
                padding-left: 22px;
                line-height: 1.7;
              }
              code {
                padding: 2px 5px;
                background: #eeeeea;
              }
              .info {
                margin-top: 28px;
                padding-top: 16px;
                border-top: 1px solid #e4e4df;
                color: #5b6470;
                font-size: 14px;
              }
            </style>
          </head>
          <body>
            <main>
              <h1>Webserver-Uebung</h1>
              <p>
                Diese Seite wird von einem Nginx-Webserver auf einer DoziLab-VM
                ausgeliefert. Sie kann als Ausgangspunkt fuer einfache
                HTML-, CSS- und JavaScript-Aufgaben genutzt werden.
              </p>
              <p>
                Die Dateien der Website liegen auf dem Server im Verzeichnis
                <code>/var/www/html</code>.
              </p>
              <ul>
                <li>per SSH auf die VM verbinden</li>
                <li><code>index.html</code> bearbeiten oder ersetzen</li>
                <li>Seite im Browser neu laden und Aenderungen pruefen</li>
              </ul>
              <div class="info">
                Stack: {{ stack_label | default('web') }}<br>
                Bereitgestellt mit Heat und Ansible.
              </div>
            </main>
          </body>
          </html>

    - name: Nginx Default Site konfigurieren
      copy:
        dest: /etc/nginx/sites-available/default
        owner: root
        group: root
        mode: "0644"
        content: |
          server {
              listen 80 default_server;
              listen [::]:80 default_server;

              root /var/www/html;
              index index.html;

              server_name _;

              location / {
                  try_files $uri $uri/ =404;
              }
          }
      register: nginx_default_site

    - name: Nginx aktivieren und starten
      service:
        name: nginx
        state: started
        enabled: true

    - name: Nginx-Konfiguration pruefen
      command: nginx -t
      changed_when: false

    - name: Nginx neu laden
      service:
        name: nginx
        state: reloaded
      when: nginx_default_site.changed

    - name: Lokalen HTTP-Endpunkt pruefen
      uri:
        url: http://127.0.0.1/
        status_code: 200
        return_content: false
      register: website_check
      retries: 10
      delay: 3
      until: website_check.status == 200

    - name: Ready Marker schreiben
      copy:
        dest: "{{ dozilab_mark_dir }}/ready"
        owner: root
        group: root
        mode: "0644"
        content: |
          DOZILAB_READY app={{ dozilab_app_name }} stack={{ stack_label | default('web') }}
