---
- name: DoziLab Static Website Lab Setup
  hosts: all
  remote_user: ubuntu
  become: true

  vars:
    dozilab_mark_dir: /var/lib/dozilab
    dozilab_site_root: /srv/dozilab/websites
    dozilab_landing_root: /var/www/html
    dozilab_app_name: ansible-static-website-lab

  tasks:
    - name: DoziLab Verzeichnisse erstellen
      file:
        path: "{{ item.path }}"
        state: directory
        owner: root
        group: root
        mode: "{{ item.mode }}"
      loop:
        - { path: "{{ dozilab_mark_dir }}", mode: "0755" }
        - { path: "/srv/dozilab", mode: "0755" }
        - { path: "{{ dozilab_site_root }}", mode: "0755" }
        - { path: "{{ dozilab_landing_root }}", mode: "0755" }

    - name: Nginx installieren
      apt:
        name:
          - nginx
          - acl
        state: present
        update_cache: true
        cache_valid_time: 3600

    - name: Gruppen-Linux-Accounts validieren
      assert:
        that:
          - deployment_groups is defined
          - deployment_groups | length > 0
          - item.linux is defined
          - item.linux.username is defined
          - item.linux.username is match('^[a-z_][a-z0-9_-]{0,31}$')
          - item.linux.password is defined
          - item.linux.password | length > 0
        fail_msg: "Backend-Credentials fehlen. Erwartet werden deployment_groups[].linux fuer Static Website Lab."
      loop: "{{ deployment_groups | default([]) }}"
      no_log: true

    - name: Web-Editor-Gruppen pro Kursgruppe erstellen
      group:
        name: "{{ item.linux.username }}"
        state: present
      loop: "{{ deployment_groups | default([]) }}"
      no_log: true

    - name: Lehrer zu allen Web-Editor-Gruppen hinzufuegen
      user:
        name: "{{ teacher.linux.username }}"
        groups: "{{ (deployment_groups | default([]) | map(attribute='linux.username') | list) | join(',') }}"
        append: true
      when:
        - teacher.linux.username is defined
        - deployment_groups | default([]) | length > 0

    - name: Gruppen-Linux-Accounts erstellen und eigene Webroot erlauben
      user:
        name: "{{ item.linux.username }}"
        shell: /bin/bash
        create_home: true
        group: "{{ item.linux.username }}"
        append: true
        state: present
      loop: "{{ deployment_groups | default([]) }}"
      no_log: true

    - name: Gruppen-Linux-Passwoerter setzen
      shell: "echo '{{ item.linux.username }}:{{ item.linux.password }}' | chpasswd"
      loop: "{{ deployment_groups | default([]) }}"
      no_log: true

    - name: Gruppen-Webroots erstellen
      file:
        path: "{{ dozilab_site_root }}/{{ item.linux.username }}"
        state: directory
        owner: "{{ item.linux.username }}"
        group: "{{ item.linux.username }}"
        mode: "2770"
      loop: "{{ deployment_groups | default([]) }}"
      no_log: true

    - name: SSH fuer Gruppen-Accounts erlauben
      copy:
        dest: /etc/ssh/sshd_config.d/98-dozilab-allowusers.conf
        mode: "0644"
        content: "AllowUsers ubuntu {{ teacher.linux.username }}{% for group in deployment_groups | default([]) %} {{ group.linux.username }}{% endfor %}\n"
      notify: SSH neu starten

    - name: Gruppen-Startseiten schreiben
      copy:
        dest: "{{ dozilab_site_root }}/{{ item.linux.username }}/index.html"
        owner: "{{ item.linux.username }}"
        group: "{{ item.linux.username }}"
        mode: "0660"
        content: |
          <!doctype html>
          <html lang="de">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>{{ item.group_name | default(item.linux.username) }} Website</title>
            <style>
              :root {
                color-scheme: light;
                font-family: Arial, Helvetica, sans-serif;
                background: #f6f6f3;
                color: #20242a;
              }
              body {
                margin: 0;
                min-height: 100vh;
              }
              main {
                width: min(860px, calc(100% - 40px));
                margin: 72px auto;
                background: #ffffff;
                border: 1px solid #d9d9d3;
                padding: 34px;
              }
              h1 {
                margin: 0 0 10px;
                font-size: 30px;
                line-height: 1.2;
              }
              p {
                max-width: 680px;
                margin: 0 0 16px;
                font-size: 16px;
                line-height: 1.55;
              }
              ul {
                margin: 18px 0 0;
                padding-left: 22px;
                line-height: 1.7;
              }
              code {
                padding: 2px 5px;
                background: #eeeeea;
              }
              .info {
                margin-top: 28px;
                padding-top: 16px;
                border-top: 1px solid #e4e4df;
                color: #5b6470;
                font-size: 14px;
              }
            </style>
          </head>
          <body>
            <main>
              <h1>{{ item.group_name | default(item.linux.username) }}</h1>
              <p>
                Das ist die eigene Website dieser Kursgruppe. Aenderungen an
                dieser Datei sind sofort nach dem Speichern im Browser sichtbar.
              </p>
              <p>
                Bearbeiten:
                <code>nano {{ dozilab_site_root }}/{{ item.linux.username }}/index.html</code>
              </p>
              <ul>
                <li>Diese Gruppe: <code>/{{ item.linux.username }}/</code></li>
                <li>Webroot: <code>{{ dozilab_site_root }}/{{ item.linux.username }}</code></li>
                <li>Nach dem Speichern Browser neu laden</li>
              </ul>
              <div class="info">
                Stack: {{ stack_label | default('web') }}<br>
                Login: {{ item.linux.username }}<br>
                Bereitgestellt mit Heat und Ansible.
              </div>
            </main>
          </body>
          </html>
      loop: "{{ deployment_groups | default([]) }}"
      no_log: true

    - name: Gruppen-Webroot ACLs setzen
      command: "setfacl -R -m u:www-data:rX,g:{{ item.linux.username }}:rwX,o::--- {{ dozilab_site_root }}/{{ item.linux.username }}"
      loop: "{{ deployment_groups | default([]) }}"
      changed_when: true
      no_log: true

    - name: Gruppen-Webroot Default-ACLs fuer neue Dateien setzen
      command: "setfacl -R -m d:u:www-data:rX,d:g:{{ item.linux.username }}:rwX,d:o::--- {{ dozilab_site_root }}/{{ item.linux.username }}"
      loop: "{{ deployment_groups | default([]) }}"
      changed_when: true
      no_log: true

    - name: Landing-Page mit Gruppenuebersicht schreiben
      copy:
        dest: "{{ dozilab_landing_root }}/index.html"
        owner: root
        group: root
        mode: "0644"
        content: |
          <!doctype html>
          <html lang="de">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>DoziLab Websites</title>
            <style>
              :root { font-family: Arial, Helvetica, sans-serif; color: #20242a; background: #f5f7f8; }
              body { margin: 0; }
              main { width: min(900px, calc(100% - 40px)); margin: 56px auto; background: #fff; border: 1px solid #d9e0e6; padding: 32px; }
              h1 { margin: 0 0 12px; font-size: 30px; }
              p { line-height: 1.55; }
              ul { line-height: 1.9; padding-left: 22px; }
              code { background: #eef2f5; padding: 2px 5px; }
              a { color: #0f5c9c; }
            </style>
          </head>
          <body>
            <main>
              <h1>DoziLab Websites</h1>
              <p>Jede Kursgruppe bearbeitet ihre eigene Website.</p>
              <ul>
          {% for group in deployment_groups | default([]) %}
                <li>
                  <a href="/{{ group.linux.username }}/">{{ group.group_name | default(group.linux.username) }}</a>
                  <span> - <code>{{ dozilab_site_root }}/{{ group.linux.username }}/index.html</code></span>
                </li>
          {% endfor %}
              </ul>
            </main>
          </body>
          </html>

    - name: Nginx Default Site konfigurieren
      copy:
        dest: /etc/nginx/sites-available/default
        owner: root
        group: root
        mode: "0644"
        content: |
          server {
              listen 80 default_server;
              listen [::]:80 default_server;

              root {{ dozilab_landing_root }};
              index index.html;

              server_name _;

              location / {
                  try_files $uri $uri/ =404;
              }

          {% for group in deployment_groups | default([]) %}
              location /{{ group.linux.username }}/ {
                  alias {{ dozilab_site_root }}/{{ group.linux.username }}/;
                  index index.html;
                  try_files $uri $uri/ =404;
              }
          {% endfor %}
          }
      register: nginx_default_site

    - name: Nginx aktivieren und starten
      service:
        name: nginx
        state: started
        enabled: true

    - name: Nginx-Konfiguration pruefen
      command: nginx -t
      changed_when: false

    - name: Nginx neu laden
      service:
        name: nginx
        state: reloaded
      when: nginx_default_site.changed

    - name: Lokalen HTTP-Endpunkt pruefen
      shell: |
        set -euo pipefail

        python3 - <<'PY'
        import sys
        import time
        import urllib.error
        import urllib.request

        url = "http://127.0.0.1/"
        last_error = None

        for attempt in range(10):
            try:
                with urllib.request.urlopen(url, timeout=2) as response:
                    if response.status == 200:
                        print(f"Static website HTTP ready: {response.status}")
                        sys.exit(0)
            except urllib.error.HTTPError as err:
                last_error = f"HTTP {err.code}"
            except Exception as err:
                last_error = str(err)

            if attempt < 9:
                time.sleep(3)

        sys.exit(f"Static website HTTP did not become ready: {last_error}")
        PY
      args:
        executable: /bin/bash
      changed_when: false

    - name: Ready Marker schreiben
      copy:
        dest: "{{ dozilab_mark_dir }}/ready"
        owner: root
        group: root
        mode: "0644"
        content: |
          DOZILAB_READY app={{ dozilab_app_name }} stack={{ stack_label | default('web') }} webroot={{ dozilab_site_root }}

  handlers:
    - name: SSH neu starten
      service:
        name: ssh
        state: restarted
