---
- name: DoziLab Static Website Lab Setup
  hosts: all
  remote_user: ubuntu
  become: true

  vars:
    dozilab_mark_dir: /var/lib/dozilab
    dozilab_site_root: /var/www/html
    dozilab_app_name: ansible-static-website-lab
    dozilab_web_group: webedit

  tasks:
    - name: DoziLab Verzeichnisse erstellen
      file:
        path: "{{ item.path }}"
        state: directory
        owner: root
        group: root
        mode: "{{ item.mode }}"
      loop:
        - { path: "{{ dozilab_mark_dir }}", mode: "0755" }
        - { path: "{{ dozilab_site_root }}", mode: "2775" }

    - name: Nginx installieren
      apt:
        name:
          - nginx
          - acl
        state: present
        update_cache: true
        cache_valid_time: 3600

    - name: Web-Editor-Gruppe erstellen
      group:
        name: "{{ dozilab_web_group }}"
        state: present

    - name: Lehrer zur Web-Editor-Gruppe hinzufuegen
      user:
        name: "{{ teacher.linux.username }}"
        groups: "{{ dozilab_web_group }}"
        append: true
      when: teacher.linux.username is defined

    - name: Gruppen-Linux-Accounts validieren
      assert:
        that:
          - deployment_groups is defined
          - item.linux is defined
          - item.linux.username is defined
          - item.linux.username is match('^[a-z_][a-z0-9_-]{0,31}$')
          - item.linux.password is defined
          - item.linux.password | length > 0
        fail_msg: "Backend-Credentials fehlen. Erwartet werden deployment_groups[].linux fuer Static Website Lab."
      loop: "{{ deployment_groups | default([]) }}"
      no_log: true

    - name: Gruppen-Linux-Accounts erstellen und Webroot-Zugriff erlauben
      user:
        name: "{{ item.linux.username }}"
        shell: /bin/bash
        create_home: true
        groups: "{{ dozilab_web_group }}"
        append: true
        state: present
      loop: "{{ deployment_groups | default([]) }}"
      no_log: true

    - name: Gruppen-Linux-Passwoerter setzen
      shell: "echo '{{ item.linux.username }}:{{ item.linux.password }}' | chpasswd"
      loop: "{{ deployment_groups | default([]) }}"
      no_log: true

    - name: SSH fuer Gruppen-Accounts erlauben
      copy:
        dest: /etc/ssh/sshd_config.d/98-dozilab-allowusers.conf
        mode: "0644"
        content: "AllowUsers ubuntu {{ teacher.linux.username }}{% for group in deployment_groups | default([]) %} {{ group.linux.username }}{% endfor %}\n"
      notify: SSH neu starten

    - name: Webroot fuer Bearbeitung ohne sudo vorbereiten
      file:
        path: "{{ dozilab_site_root }}"
        state: directory
        owner: root
        group: "{{ dozilab_web_group }}"
        mode: "2775"

    - name: Standard-Webseite schreiben
      copy:
        dest: "{{ dozilab_site_root }}/index.html"
        owner: root
        group: "{{ dozilab_web_group }}"
        mode: "0664"
        content: |
          <!doctype html>
          <html lang="de">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Webserver Uebung</title>
            <style>
              :root {
                color-scheme: light;
                font-family: Arial, Helvetica, sans-serif;
                background: #f6f6f3;
                color: #20242a;
              }
              body {
                margin: 0;
                min-height: 100vh;
              }
              main {
                width: min(860px, calc(100% - 40px));
                margin: 72px auto;
                background: #ffffff;
                border: 1px solid #d9d9d3;
                padding: 34px;
              }
              h1 {
                margin: 0 0 10px;
                font-size: 30px;
                line-height: 1.2;
              }
              p {
                max-width: 680px;
                margin: 0 0 16px;
                font-size: 16px;
                line-height: 1.55;
              }
              ul {
                margin: 18px 0 0;
                padding-left: 22px;
                line-height: 1.7;
              }
              code {
                padding: 2px 5px;
                background: #eeeeea;
              }
              .info {
                margin-top: 28px;
                padding-top: 16px;
                border-top: 1px solid #e4e4df;
                color: #5b6470;
                font-size: 14px;
              }
            </style>
          </head>
          <body>
            <main>
              <h1>Webserver-Uebung</h1>
              <p>
                Diese Seite wird von einem Nginx-Webserver auf einer DoziLab-VM
                ausgeliefert. Sie kann als Ausgangspunkt fuer einfache
                HTML-, CSS- und JavaScript-Aufgaben genutzt werden.
              </p>
              <p>
                Die Dateien der Website liegen auf dem Server im Verzeichnis
                <code>/var/www/html</code>.
              </p>
              <ul>
                <li>per SSH auf die VM verbinden</li>
                <li><code>nano /var/www/html/index.html</code> ausfuehren</li>
                <li>speichern und die Seite im Browser neu laden</li>
              </ul>
              <div class="info">
                Stack: {{ stack_label | default('web') }}<br>
                Bereitgestellt mit Heat und Ansible.
              </div>
            </main>
          </body>
          </html>

    - name: Webroot ACLs fuer neue Dateien setzen
      command: "{{ item }}"
      loop:
        - "setfacl -R -m g:{{ dozilab_web_group }}:rwX {{ dozilab_site_root }}"
        - "setfacl -R -m d:g:{{ dozilab_web_group }}:rwX {{ dozilab_site_root }}"
      changed_when: true

    - name: Nginx Default Site konfigurieren
      copy:
        dest: /etc/nginx/sites-available/default
        owner: root
        group: root
        mode: "0644"
        content: |
          server {
              listen 80 default_server;
              listen [::]:80 default_server;

              root /var/www/html;
              index index.html;

              server_name _;

              location / {
                  try_files $uri $uri/ =404;
              }
          }
      register: nginx_default_site

    - name: Nginx aktivieren und starten
      service:
        name: nginx
        state: started
        enabled: true

    - name: Nginx-Konfiguration pruefen
      command: nginx -t
      changed_when: false

    - name: Nginx neu laden
      service:
        name: nginx
        state: reloaded
      when: nginx_default_site.changed

    - name: Lokalen HTTP-Endpunkt pruefen
      shell: |
        set -euo pipefail

        python3 - <<'PY'
        import sys
        import time
        import urllib.error
        import urllib.request

        url = "http://127.0.0.1/"
        last_error = None

        for attempt in range(10):
            try:
                with urllib.request.urlopen(url, timeout=2) as response:
                    if response.status == 200:
                        print(f"Static website HTTP ready: {response.status}")
                        sys.exit(0)
            except urllib.error.HTTPError as err:
                last_error = f"HTTP {err.code}"
            except Exception as err:
                last_error = str(err)

            if attempt < 9:
                time.sleep(3)

        sys.exit(f"Static website HTTP did not become ready: {last_error}")
        PY
      args:
        executable: /bin/bash
      changed_when: false

    - name: Ready Marker schreiben
      copy:
        dest: "{{ dozilab_mark_dir }}/ready"
        owner: root
        group: root
        mode: "0644"
        content: |
          DOZILAB_READY app={{ dozilab_app_name }} stack={{ stack_label | default('web') }} webroot={{ dozilab_site_root }}

  handlers:
    - name: SSH neu starten
      service:
        name: ssh
        state: restarted
