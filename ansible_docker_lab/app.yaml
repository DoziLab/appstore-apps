app:
  name: ansible-docker-lab
  label: Ansible Docker Lab
  version: 1.0.0
  description: >
    Ubuntu VM mit Docker und Docker Compose fuer Container-Grundlagen.
    Infrastruktur wird per Heat erstellt, Installation und Demo-Container
    werden per Ansible eingerichtet.
  owner_team: dozilab-app-team

artifacts:
  heat_template: heat/main.yaml
  ansible_playbook: playbooks/main.yml

parameters:
  - name: stack_label
    label: Stack-Label
    step: template
    type: string
    default: docker
    required: true
    description: "Kurzes Label fuer VM-Namen und Metadaten, z.B. docker-2026-01."

  - name: image
    label: Betriebssystem-Image
    step: konfiguration
    type: string
    default: "Ubuntu 22.04 2025-01"
    required: true
    enum:
      - "Ubuntu 22.04 2025-01"
      - "Ubuntu 24.04 2025-01"
  

  - name: flavor
    label: VM-Groesse (Flavor)
    step: konfiguration
    type: string
    default: "gp1.small"
    required: true
    enum:
      - "gp1.small"
      - "gp1.medium"
      - "gp1.large"
    description: "gp1.small reicht fuer einfache Docker- und Compose-Uebungen."

  - name: volume_size
    label: Speicher (GB)
    step: konfiguration
    type: number
    default: 8
    required: true
    enum:
      - 8
      - 16
      - 32
      - 64
    description: "Groesse der Root-Disk als Cinder-Volume."

  - name: ssh_cidr
    label: SSH-Zugriff (CIDR)
    step: netzwerk
    type: string
    default: "141.72.0.0/16"
    required: true
    description: "Nur dieses Netz darf per SSH zugreifen. Standard: DHBW/VPN."

  - name: web_cidr
    label: Demo-Webzugriff (CIDR)
    step: netzwerk
    type: string
    default: "141.72.0.0/16"
    required: true
    description: "Nur dieses Netz darf die Container-Demo ueber HTTP Port 80 erreichen."

  - name: network
    label: Internes Netzwerk
    step: netzwerk
    type: string
    default: "NAT"
    hidden: true
    description: "Internes OpenStack-Netzwerk."

  - name: external_network
    label: Externes Netzwerk
    step: netzwerk
    type: string
    default: "DHBW"
    hidden: true
    description: "Floating-IP-Netzwerk."

outputs:
  - name: demo_url
    label: Demo URL
    from_heat_output: demo_url

  - name: floating_ip
    label: Floating IP
    from_heat_output: floating_ip

  - name: private_ip
    label: Private IP
    from_heat_output: private_ip

  - name: server_id
    label: Server ID
    from_heat_output: server_id

  - name: ssh_hint
    label: SSH Hinweis
    from_heat_output: ssh_hint

  - name: root_volume_id
    label: Root Volume ID
    from_heat_output: root_volume_id
