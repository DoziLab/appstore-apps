app:
  name: ansible-jupyter-datascience-lab
  label: Ansible Jupyter Data Science Lab
  version: 2.0.0
  description: >
    Ubuntu VM mit JupyterHub, JupyterLab und Data-Science-Paketen.
    Lokale Kursbenutzer werden aus Backend-Credentials erstellt.
    Infrastruktur wird per Heat erstellt, Konfiguration läuft per Ansible.
    Root disk is a Cinder volume (Boot from Volume) so "Speicher" can be configured.
  owner_team: dozilab-app-team

artifacts:
  heat_template:    heat/main.yaml
  ansible_playbook: playbooks/main.yml

parameters:
  - name: stack_label
    label: Stack-Label
    step: template
    type: string
    default: "jupyter"
    required: true
    description: >
      Kurzes Label für diesen Stack, z.B. ds-2026-01.
      Muss passen zu: ^[a-z0-9][a-z0-9-]{0,30}$

  - name: image
    label: Betriebssystem-Image
    step: konfiguration
    type: string
    default: "Ubuntu 22.04 2025-01"
    enum:
      - "Ubuntu 22.04 2025-01"
      - "Ubuntu 24.04 2025-01"

    required: true

  - name: flavor
    label: VM-Größe (Flavor)
    step: konfiguration
    type: string
    default: "gp1.medium"
    enum:
      - "gp1.small"
      - "gp1.medium"
    required: true
    description: "gp1.medium ist für mehrere Jupyter-Nutzer empfohlen."

  - name: volume_size
    label: Speicher (GB)
    step: konfiguration
    type: number
    default: 16
    enum:
      - 8
      - 16
      - 32
      - 64
      - 128
    required: true
    description: "Größe der Root-Disk als Cinder-Volume (Boot from Volume)."

  - name: ssh_cidr
    label: SSH-Zugriff (CIDR)
    step: netzwerk
    type: string
    default: "141.72.0.0/16"
    required: true
    description: "Nur dieses Netz darf per SSH zugreifen. Standard: DHBW/VPN."

  - name: web_cidr
    label: Jupyter-Zugriff (CIDR)
    step: netzwerk
    type: string
    default: "141.72.0.0/16"
    required: true
    description: "Nur dieses Netz darf JupyterHub über HTTP Port 80 erreichen."

  - name: install_examples
    label: Beispiel-Notebooks installieren
    step: konfiguration
    type: boolean
    default: true
    required: true
    description: "Erstellt Beispiel-Notebooks im Arbeitsordner jedes Benutzers."

  - name: workdir
    label: Arbeitsordner
    step: zugriff
    type: string
    default: "work"
    required: true
    description: "Directory created under each user's home and used by JupyterLab."

  - name: network
    label: Internes Netzwerk
    step: netzwerk
    type: string
    default: "NAT"
    hidden: true
    description: "Internal network."

  - name: external_network
    label: Externes Netzwerk (Floating IP)
    step: netzwerk
    type: string
    default: "DHBW"
    hidden: true
    description: "Floating-IP-Netzwerk."

credentials:
  per_group:
    - linux:
        username: "{{ username }}"
        password: generate

  teacher:
    # teacher.linux automatisch vorhanden — kein Eintrag nötig

outputs:
  - name: ssh_user
    label: SSH User
    from_heat_output: ssh_user

  - name: floating_ip
    label: Floating IP
    from_heat_output: floating_ip

  - name: private_ip
    label: Private IP
    from_heat_output: private_ip

  - name: server_id
    label: Server ID
    from_heat_output: server_id

  - name: jupyter_url
    label: Jupyter URL
    from_heat_output: jupyter_url

  - name: ssh_hint
    label: SSH Hint
    from_heat_output: ssh_hint

  - name: root_volume_id
    label: Root Volume ID
    from_heat_output: root_volume_id
