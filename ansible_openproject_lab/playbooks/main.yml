---
- name: DoziLab OpenProject Lab Setup
  hosts: all
  remote_user: ubuntu
  become: true

  vars:
    dozilab_mark_dir: /var/lib/dozilab
    openproject_data_dir: /var/lib/openproject
    openproject_secret_file: /etc/openproject/secret_key_base
    openproject_env_file: /etc/openproject/openproject.env
    openproject_image: "openproject/openproject:{{ openproject_image_tag | default('17') }}"
    openproject_public_host: "{{ ansible_host | default(inventory_hostname) }}"
    openproject_container_name: openproject
    openproject_unit_name: openproject.service

  tasks:
    - name: Stack-Label validieren
      assert:
        that:
          - stack_label | default('project') is match('^[a-z0-9][a-z0-9-]{0,30}$')
        fail_msg: "stack_label muss ^[a-z0-9][a-z0-9-]{0,30}$ erfuellen."

    - name: OpenProject Backend-Credentials validieren
      assert:
        that:
          - teacher.linux is defined
          - teacher.linux.username is defined
          - teacher.linux.username is match('^[a-z_][a-z0-9_-]{0,31}$')
          - teacher.linux.password is defined
          - teacher.linux.password | length > 0
          - deployment_groups is defined
          - deployment_groups | length > 0
        fail_msg: "Backend-Credentials fehlen. Erwartet werden teacher.linux und deployment_groups[].linux."
      no_log: true

    - name: OpenProject Gruppen-Credentials validieren
      assert:
        that:
          - item.linux is defined
          - item.linux.username is defined
          - item.linux.username is match('^[a-z_][a-z0-9_-]{0,31}$')
          - item.email is defined
          - "'@' in item.email"
          - item.linux.password is defined
          - item.linux.password | length > 0
        fail_msg: "Ungueltige OpenProject Gruppen-Credentials."
      loop: "{{ deployment_groups | default([]) }}"
      no_log: true

    - name: Gruppen-Linux-Accounts erstellen
      user:
        name: "{{ item.linux.username }}"
        shell: /bin/bash
        create_home: true
        state: present
      loop: "{{ deployment_groups | default([]) }}"
      no_log: true

    - name: Gruppen-Linux-Passwoerter setzen
      shell: "echo '{{ item.linux.username }}:{{ item.linux.password }}' | chpasswd"
      loop: "{{ deployment_groups | default([]) }}"
      no_log: true

    - name: DoziLab und OpenProject Verzeichnisse erstellen
      file:
        path: "{{ item.path }}"
        state: directory
        owner: root
        group: root
        mode: "{{ item.mode }}"
      loop:
        - { path: "{{ dozilab_mark_dir }}", mode: "0755" }
        - { path: "/etc/openproject", mode: "0700" }
        - { path: "{{ openproject_data_dir }}", mode: "0755" }
        - { path: "{{ openproject_data_dir }}/pgdata", mode: "0755" }
        - { path: "{{ openproject_data_dir }}/assets", mode: "0755" }

    - name: Docker installieren
      apt:
        name:
          - docker.io
          - openssl
        state: present
        update_cache: true
        cache_valid_time: 3600

    - name: Docker aktivieren und starten
      service:
        name: docker
        state: started
        enabled: true

    - name: OpenProject Secret-Datei pruefen
      stat:
        path: "{{ openproject_secret_file }}"
      register: openproject_secret_stat

    - name: Vorhandenes OpenProject Secret lesen
      slurp:
        src: "{{ openproject_secret_file }}"
      register: existing_openproject_secret_raw
      when: openproject_secret_stat.stat.exists
      no_log: true

    - name: Vorhandenes OpenProject Secret auswerten
      set_fact:
        existing_openproject_secret: "{{ existing_openproject_secret_raw.content | default('') | b64decode | trim }}"
      no_log: true

    - name: OpenProject Secret erzeugen
      command: "openssl rand -hex 64"
      register: generated_openproject_secret
      changed_when: generated_openproject_secret.stdout is defined
      when: (existing_openproject_secret | default('')) is not match('^[0-9a-f]{128}$')
      no_log: true

    - name: OpenProject Secret speichern
      copy:
        dest: "{{ openproject_secret_file }}"
        owner: root
        group: root
        mode: "0600"
        content: "{{ generated_openproject_secret.stdout | default(existing_openproject_secret | default('')) }}\n"
      no_log: true

    - name: OpenProject Secret lesen
      slurp:
        src: "{{ openproject_secret_file }}"
      register: openproject_secret_raw
      no_log: true

    - name: OpenProject Docker Image laden
      command: "docker pull {{ openproject_image }}"
      register: docker_pull_result
      changed_when: "'Downloaded newer image' in docker_pull_result.stdout or 'Pull complete' in docker_pull_result.stdout"

    - name: OpenProject Environment schreiben
      copy:
        dest: "{{ openproject_env_file }}"
        owner: root
        group: root
        mode: "0600"
        content: |
          SECRET_KEY_BASE={{ openproject_secret_raw.content | b64decode | trim }}
          OPENPROJECT_HOST__NAME={{ openproject_public_host }}
          OPENPROJECT_HTTPS=false
      no_log: true
      register: openproject_env

    - name: OpenProject systemd Unit schreiben
      copy:
        dest: "/etc/systemd/system/{{ openproject_unit_name }}"
        owner: root
        group: root
        mode: "0644"
        content: |
          [Unit]
          Description=DoziLab OpenProject Container
          Requires=docker.service
          After=docker.service

          [Service]
          Restart=always
          RestartSec=10
          TimeoutStartSec=0
          ExecStartPre=-/usr/bin/docker rm -f {{ openproject_container_name }}
          ExecStart=/usr/bin/docker run --name {{ openproject_container_name }} \
            --publish 80:80 \
            --env-file {{ openproject_env_file }} \
            --volume {{ openproject_data_dir }}/pgdata:/var/openproject/pgdata \
            --volume {{ openproject_data_dir }}/assets:/var/openproject/assets \
            {{ openproject_image }}
          ExecStop=/usr/bin/docker stop {{ openproject_container_name }}
          ExecStopPost=-/usr/bin/docker rm -f {{ openproject_container_name }}

          [Install]
          WantedBy=multi-user.target
      register: openproject_unit

    - name: systemd neu laden
      systemd:
        daemon_reload: true
      when: openproject_unit.changed

    - name: OpenProject starten
      service:
        name: "{{ openproject_unit_name }}"
        state: restarted
        enabled: true
      when: openproject_unit.changed or openproject_env.changed or docker_pull_result.changed

    - name: OpenProject sicherstellen
      service:
        name: "{{ openproject_unit_name }}"
        state: started
        enabled: true

    - name: OpenProject Service pruefen
      command: systemctl is-active --quiet "{{ openproject_unit_name }}"
      changed_when: false

    - name: Auf OpenProject HTTP warten
      shell: |
        set -euo pipefail

        python3 - <<'PY'
        import sys
        import time
        import urllib.error
        import urllib.request

        url = "http://127.0.0.1/"
        host_header = "{{ openproject_public_host }}"
        accepted_status = {200, 301, 302, 303}
        last_error = None

        for attempt in range(90):
            try:
                request = urllib.request.Request(url, headers={"Host": host_header}, method="GET")
                opener = urllib.request.build_opener(urllib.request.HTTPRedirectHandler)
                with opener.open(request, timeout=3) as response:
                    if response.status in accepted_status:
                        print(f"OpenProject HTTP ready: {response.status}")
                        sys.exit(0)
            except urllib.error.HTTPError as err:
                if err.code in accepted_status:
                    print(f"OpenProject HTTP ready: {err.code}")
                    sys.exit(0)
                last_error = f"HTTP {err.code}"
            except Exception as err:
                last_error = str(err)

            if attempt < 89:
                time.sleep(10)

        sys.exit(f"OpenProject HTTP did not become ready: {last_error}")
        PY
      args:
        executable: /bin/bash
      changed_when: false

    - name: OpenProject User-Setup JSON schreiben
      copy:
        dest: /etc/openproject/dozilab-users.json
        owner: root
        group: root
        mode: "0600"
        content: |
          {
            "admin": {
              "username": {{ teacher.linux.username | to_json }},
              "email": {{ teacher.email | default('admin@dozilab.local') | to_json }},
              "password": {{ teacher.linux.password | to_json }},
              "first_name": {{ teacher.first_name | default('DoziLab') | to_json }},
              "last_name": {{ teacher.last_name | default('Admin') | to_json }}
            },
            "groups": [
          {% for group in deployment_groups | default([]) %}
              {
                "username": {{ group.linux.username | to_json }},
                "email": {{ group.email | to_json }},
                "password": {{ group.linux.password | to_json }},
                "group_name": {{ group.group_name | default(group.username) | to_json }}
              }{% if not loop.last %},{% endif %}
          {% endfor %}
            ]
          }
      no_log: true

    - name: OpenProject Benutzer im Container anlegen
      shell: |
        set -euo pipefail

        docker cp /etc/openproject/dozilab-users.json {{ openproject_container_name }}:/tmp/dozilab-users.json

        docker exec {{ openproject_container_name }} bash -lc 'cat >/tmp/dozilab-create-users.rb <<'"'"'RUBY'"'"'
        require "json"

        data = JSON.parse(File.read("/tmp/dozilab-users.json"))

        def activate(user)
          if defined?(Principal::STATUSES) && Principal::STATUSES.respond_to?(:[])
            user.status = Principal::STATUSES[:active]
          elsif user.respond_to?(:activate)
            user.activate
          else
            user.status = 1 if user.respond_to?(:status=)
          end
        rescue
          user.status = 1 if user.respond_to?(:status=)
        end

        def set_password(user, password)
          if user.respond_to?(:password=)
            user.password = password
            user.password_confirmation = password if user.respond_to?(:password_confirmation=)
          else
            raise "OpenProject user model does not expose password="
          end
        end

        def ensure_user(entry, admin:)
          login = entry.fetch("username").to_s
          email = entry.fetch("email").to_s
          password = entry.fetch("password").to_s
          raise "empty password for #{login}" if password.empty?

          user = User.find_by(login: login) || User.find_by(mail: email) || User.new
          user.login = login if user.respond_to?(:login=)
          user.mail = email if user.respond_to?(:mail=)
          user.firstname = (entry["first_name"] || entry["group_name"] || login).to_s[0, 30] if user.respond_to?(:firstname=)
          user.lastname = (entry["last_name"] || "DoziLab").to_s[0, 30] if user.respond_to?(:lastname=)
          user.admin = admin if user.respond_to?(:admin=)
          user.force_password_change = false if user.respond_to?(:force_password_change=)
          activate(user)
          set_password(user, password)
          user.save!
          puts "#{admin ? "admin" : "user"}:#{login}:#{email}"
        end

        ensure_user(data.fetch("admin"), admin: true)
        data.fetch("groups").each do |entry|
          entry["first_name"] = entry["group_name"] || entry.fetch("username")
          entry["last_name"] = "Gruppe"
          ensure_user(entry, admin: false)
        end
        RUBY
        cd /app 2>/dev/null || cd /usr/src/app 2>/dev/null || true
        RAILS_ENV=production bundle exec rails runner /tmp/dozilab-create-users.rb'
      args:
        executable: /bin/bash
      register: openproject_user_setup
      changed_when: true
      no_log: true

    - name: Ready Marker schreiben
      copy:
        dest: "{{ dozilab_mark_dir }}/ready"
        owner: root
        group: root
        mode: "0644"
        content: |
          DOZILAB_READY app=ansible-openproject-lab stack={{ stack_label | default('project') }} url=http://{{ openproject_public_host }}/
