---
- name: DoziLab Minimal Template Lab Setup
  hosts: all
  remote_user: ubuntu
  become: true

  vars:
    dozilab_app_name: ansible-minimal-template-lab
    dozilab_mark_dir: /var/lib/dozilab
    dozilab_state_dir: /etc/dozilab
    dozilab_group_root: /srv/dozilab/groups
    dozilab_web_root: /srv/dozilab/reference-site
    dozilab_web_unit: dozilab-reference-site.service
    dozilab_create_group_users: "{{ create_group_users | default(true) }}"
    dozilab_welcome_message: "{{ welcome_message | default('Willkommen im DoziLab Template Lab.') }}"

  tasks:
    - name: Stack-Label validieren
      assert:
        that:
          - stack_label | default('demo') is match('^[a-z0-9][a-z0-9-]{0,30}$')
        fail_msg: "stack_label muss ^[a-z0-9][a-z0-9-]{0,30}$ erfuellen."

    - name: Backend-Gruppen validieren
      assert:
        that:
          - deployment_groups is defined
          - deployment_groups | length > 0
        fail_msg: "deployment_groups fehlt. Die App erwartet mindestens eine Kursgruppe."

    - name: Gruppen-Credentials validieren
      assert:
        that:
          - item.username is defined
          - item.username is match('^[a-z_][a-z0-9_]{0,31}$')
          - item.linux is defined
          - item.linux.password is defined
          - item.linux.password | length >= 6
        fail_msg: "Ungueltige Gruppen-Credentials. Erwartet deployment_groups[].linux.password."
      loop: "{{ deployment_groups }}"
      no_log: true

    - name: DoziLab Verzeichnisse erstellen
      file:
        path: "{{ item.path }}"
        state: directory
        owner: root
        group: root
        mode: "{{ item.mode }}"
      loop:
        - { path: "{{ dozilab_mark_dir }}", mode: "0755" }
        - { path: "{{ dozilab_state_dir }}", mode: "0700" }
        - { path: "{{ dozilab_group_root }}", mode: "0755" }
        - { path: "{{ dozilab_web_root }}", mode: "0755" }

    - name: Deployment-Metadaten aus Backend-Variablen schreiben
      copy:
        dest: "{{ dozilab_state_dir }}/template-lab.json"
        owner: root
        group: root
        mode: "0600"
        content: |
          {
            "app": {{ dozilab_app_name | to_json }},
            "stack_label": {{ stack_label | default('demo') | to_json }},
            "teacher_available": {{ (teacher is defined) | to_json }},
            "groups": [
          {% for group in deployment_groups %}
              {
                "group_name": {{ group.group_name | default(group.username) | to_json }},
                "username": {{ group.username | to_json }},
                "has_linux_password": {{ (group.linux.password is defined) | to_json }},
                "has_ssh_key": {{ (group.linux.ssh_key is defined and group.linux.ssh_key.public_key is defined) | to_json }}
              }{% if not loop.last %},{% endif %}
          {% endfor %}
            ]
          }
      no_log: true

    - name: Gruppen-Linux-Accounts erstellen
      user:
        name: "{{ item.username }}"
        shell: /bin/bash
        create_home: true
        state: present
      loop: "{{ deployment_groups }}"
      when: dozilab_create_group_users | bool
      no_log: true

    - name: Gruppen-Passwoerter setzen
      user:
        name: "{{ item.username }}"
        password: "{{ item.linux.password | password_hash('sha512') }}"
        update_password: always
      loop: "{{ deployment_groups }}"
      when: dozilab_create_group_users | bool
      no_log: true

    - name: Gruppen-SSH-Public-Key installieren
      ansible.posix.authorized_key:
        user: "{{ item.username }}"
        key: "{{ item.linux.ssh_key.public_key }}"
        state: present
      loop: "{{ deployment_groups }}"
      when:
        - dozilab_create_group_users | bool
        - item.linux.ssh_key is defined
        - item.linux.ssh_key.public_key is defined
      no_log: true

    - name: Gruppen-Arbeitsverzeichnisse erstellen
      file:
        path: "{{ dozilab_group_root }}/{{ item.username }}"
        state: directory
        owner: "{{ item.username if (dozilab_create_group_users | bool) else 'root' }}"
        group: "{{ item.username if (dozilab_create_group_users | bool) else 'root' }}"
        mode: "0750"
      loop: "{{ deployment_groups }}"
      no_log: true

    - name: Welcome-Datei in Gruppen-Home kopieren
      copy:
        src: /opt/dozilab/files/welcome.txt
        dest: "/home/{{ item.username }}/welcome.txt"
        owner: "{{ item.username }}"
        group: "{{ item.username }}"
        mode: "0640"
        remote_src: true
      loop: "{{ deployment_groups }}"
      when: dozilab_create_group_users | bool
      no_log: true

    - name: Stack-Label in Welcome-Datei ersetzen
      replace:
        path: "/home/{{ item.username }}/welcome.txt"
        regexp: "__STACK_LABEL__"
        replace: "{{ stack_label | default('demo') }}"
      loop: "{{ deployment_groups }}"
      when: dozilab_create_group_users | bool
      no_log: true

    - name: Gruppennamen in Welcome-Datei ersetzen
      replace:
        path: "/home/{{ item.username }}/welcome.txt"
        regexp: "__GROUP_NAME__"
        replace: "{{ item.group_name | default(item.username) }}"
      loop: "{{ deployment_groups }}"
      when: dozilab_create_group_users | bool
      no_log: true

    - name: Begruessungstext in Welcome-Datei ersetzen
      replace:
        path: "/home/{{ item.username }}/welcome.txt"
        regexp: "__WELCOME_MESSAGE__"
        replace: "{{ dozilab_welcome_message }}"
      loop: "{{ deployment_groups }}"
      when: dozilab_create_group_users | bool
      no_log: true

    - name: Gemeinsames User-File in Gruppenordner kopieren
      copy:
        src: /opt/dozilab/user-files/shared/material
        dest: "{{ dozilab_group_root }}/{{ item.username }}/shared-material"
        owner: "{{ item.username if (dozilab_create_group_users | bool) else 'root' }}"
        group: "{{ item.username if (dozilab_create_group_users | bool) else 'root' }}"
        mode: "0640"
        remote_src: true
      loop: "{{ deployment_groups }}"
      when:
        - user_files is defined
        - (user_files.shared_material | default({})).exists | default(false)
      no_log: true

    - name: Gruppen-User-File in Gruppenordner kopieren
      copy:
        src: "/opt/dozilab/user-files/{{ group_file_key }}/material"
        dest: "{{ dozilab_group_root }}/{{ item.username }}/group-material"
        owner: "{{ item.username if (dozilab_create_group_users | bool) else 'root' }}"
        group: "{{ item.username if (dozilab_create_group_users | bool) else 'root' }}"
        mode: "0640"
        remote_src: true
      loop: "{{ deployment_groups }}"
      vars:
        group_file_key: "{{ item.group_name | default(item.username) }}"
      when:
        - user_files is defined
        - ((user_files.group_material | default({})).get(group_file_key, {})).exists | default(false)
      no_log: true

    - name: Check-Script ausfuehrbar machen
      file:
        path: /opt/dozilab/scripts/check_template_setup.sh
        mode: "0755"

    - name: Gruppen-Setup pruefen
      command: /opt/dozilab/scripts/check_template_setup.sh {{ item.username }}
      loop: "{{ deployment_groups }}"
      when: dozilab_create_group_users | bool
      changed_when: false
      no_log: true

    - name: Kleine Referenz-Webseite schreiben
      copy:
        dest: "{{ dozilab_web_root }}/index.html"
        owner: root
        group: root
        mode: "0644"
        content: |
          <!doctype html>
          <html lang="de">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>DoziLab Reference App</title>
            <style>
              body { font-family: Arial, sans-serif; max-width: 840px; margin: 32px auto; padding: 0 20px; line-height: 1.5; color: #1f2933; }
              h1 { font-size: 28px; margin-bottom: 8px; }
              code { background: #eef2f6; padding: 2px 5px; border-radius: 4px; }
              table { border-collapse: collapse; width: 100%; margin-top: 16px; }
              th, td { border: 1px solid #d6dde5; padding: 8px; text-align: left; }
              th { background: #f5f7fa; }
            </style>
          </head>
          <body>
            <h1>DoziLab Minimal Template Lab</h1>
            <p>{{ dozilab_welcome_message }}</p>
            <p>Stack: <code>{{ stack_label | default('demo') }}</code></p>
            <p>Diese Seite wird vom Ansible-Playbook erzeugt und per systemd mit <code>python3 -m http.server</code> ausgeliefert.</p>
            <table>
              <thead>
                <tr>
                  <th>Gruppe</th>
                  <th>Linux-User</th>
                  <th>Passwort generiert</th>
                  <th>SSH-Key generiert</th>
                </tr>
              </thead>
              <tbody>
          {% for group in deployment_groups %}
                <tr>
                  <td>{{ group.group_name | default(group.username) }}</td>
                  <td><code>{{ group.username }}</code></td>
                  <td>{{ 'ja' if group.linux.password is defined else 'nein' }}</td>
                  <td>{{ 'ja' if group.linux.ssh_key is defined and group.linux.ssh_key.public_key is defined else 'nein' }}</td>
                </tr>
          {% endfor %}
              </tbody>
            </table>
          </body>
          </html>

    - name: Referenz-Webservice Unit schreiben
      copy:
        dest: "/etc/systemd/system/{{ dozilab_web_unit }}"
        owner: root
        group: root
        mode: "0644"
        content: |
          [Unit]
          Description=DoziLab minimal reference web page
          After=network-online.target

          [Service]
          WorkingDirectory={{ dozilab_web_root }}
          ExecStart=/usr/bin/python3 -m http.server 80 --bind 0.0.0.0 --directory {{ dozilab_web_root }}
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
      register: dozilab_web_unit_file

    - name: systemd neu laden
      systemd:
        daemon_reload: true
      when: dozilab_web_unit_file.changed

    - name: Referenz-Webservice starten
      service:
        name: "{{ dozilab_web_unit }}"
        state: restarted
        enabled: true
      when: dozilab_web_unit_file.changed

    - name: Referenz-Webservice sicherstellen
      service:
        name: "{{ dozilab_web_unit }}"
        state: started
        enabled: true

    - name: Referenz-Webservice pruefen
      command: systemctl is-active --quiet "{{ dozilab_web_unit }}"
      changed_when: false

    - name: Ready Marker schreiben
      copy:
        dest: "{{ dozilab_mark_dir }}/ready"
        owner: root
        group: root
        mode: "0644"
        content: |
          DOZILAB_READY app={{ dozilab_app_name }} stack={{ stack_label | default('demo') }} url=http://{{ ansible_host | default(inventory_hostname) }}/
