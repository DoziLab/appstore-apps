app:
  name: ansible-minimal-template-lab
  label: Ansible Minimal Template Lab
  version: 1.1.0
  description: >
    Kleine Referenz-App fuer DoziLab App-Entwickler. Deployt eine Ubuntu-VM,
    laesst die Infrastruktur durch Heat erstellen und zeigt die wichtigsten
    App-Bausteine: Parameter, Outputs, Credentials, User-Files, Scripts,
    Config-Files und ein kleines Web-Endpoint.
  owner_team: dozilab-app-team

  allow_user_files: true

artifacts:
  heat_template: heat/main.yaml
  ansible_playbook: playbooks/main.yml
  shell_scripts:
    - scripts/check_template_setup.sh
  config_files:
    - files/welcome.txt

parameters:
  - name: stack_label
    label: Stack-Label
    step: template
    type: string
    default: demo
    required: true
    description: "Kurzes Label fuer VM-Namen und Metadaten, z.B. demo-2026."

  - name: image
    label: Betriebssystem-Image
    step: konfiguration
    type: string
    default: "Ubuntu 22.04 2025-01"
    required: true
    enum:
      - "Ubuntu 22.04 2025-01"
      - "Ubuntu 24.04 2025-01"

  - name: flavor
    label: VM-Groesse (Flavor)
    step: konfiguration
    type: string
    default: "gp1.small"
    required: true
    enum:
      - "gp1.small"
      - "gp1.medium"
    description: "gp1.small reicht fuer diese Beispiel-App."

  - name: volume_size
    label: Speicher (GB)
    step: konfiguration
    type: number
    default: 8
    required: true
    enum:
      - 8
      - 16
      - 32
      - 64
    description: "Groesse der Root-Disk als Cinder-Volume."

  - name: ssh_cidr
    label: SSH-Zugriff (CIDR)
    step: netzwerk
    type: string
    default: "141.72.0.0/16"
    required: true
    description: "Nur dieses Netz darf per SSH zugreifen. Standard: DHBW/VPN."

  - name: web_cidr
    label: Web-Zugriff (CIDR)
    step: netzwerk
    type: string
    default: "141.72.0.0/16"
    required: true
    description: "Nur dieses Netz darf die kleine Referenz-Webseite ueber HTTP Port 80 erreichen."

  - name: create_group_users
    label: Gruppen-Benutzer anlegen
    step: zugriff
    type: boolean
    default: true
    required: true
    description: "Legt pro Kursgruppe einen Linux-User aus deployment_groups an."

  - name: welcome_message
    label: Begruessungstext
    step: zugriff
    type: string
    default: "Willkommen im DoziLab Template Lab."
    required: true
    description: "Wird in die Beispiel-Welcome-Datei jedes Gruppen-Users geschrieben."

  - name: network
    label: Internes Netzwerk
    step: netzwerk
    type: string
    default: "NAT"
    hidden: true
    description: "Internes OpenStack-Netzwerk."

  - name: external_network
    label: Externes Netzwerk
    step: netzwerk
    type: string
    default: "DHBW"
    hidden: true
    description: "Floating-IP-Netzwerk."

credentials:
  per_group:
    - linux:
        username: "{{ username }}"
        password: generate
        ssh_key: generate

  teacher:
    # teacher.linux automatisch vorhanden - kein Eintrag noetig.

user_files:
  - name: shared_material
    label: "Gemeinsames Material"
    description: "Optionale Datei fuer alle Gruppen; landet im Gruppenordner."
    required: false
    accept: "*"
    destination: /opt/dozilab/user-files/shared/material
    mode: all_stacks

  - name: group_material
    label: "Gruppenmaterial"
    description: "Optionale Datei pro Gruppe; zeigt mode=per_group."
    required: false
    accept: "*"
    destination: /opt/dozilab/user-files/{{ group_name }}/material
    mode: per_group

outputs:
  - name: reference_url
    label: Referenz-Webseite
    from_heat_output: reference_url

  - name: ssh_user
    label: SSH User
    from_heat_output: ssh_user

  - name: floating_ip
    label: Floating IP
    from_heat_output: floating_ip

  - name: private_ip
    label: Private IP
    from_heat_output: private_ip

  - name: server_id
    label: Server ID
    from_heat_output: server_id

  - name: ssh_hint
    label: SSH Hinweis
    from_heat_output: ssh_hint

  - name: root_volume_id
    label: Root Volume ID
    from_heat_output: root_volume_id
