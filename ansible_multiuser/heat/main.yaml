heat_template_version: 2018-08-31

description: >
  DoziLab Ansible Multi-User VM.
  Nur Infrastruktur — keine user_data, keine cloud-init.
  Konfiguration übernimmt Ansible vom Backend aus per SSH.

parameters:
  image:
    type: string
    default: "Ubuntu 22.04 2025-01"
    constraints:
      - allowed_values:
          - "Ubuntu 22.04 2025-01"
          - "Ubuntu 24.04 2025-01"
          - "Ubuntu 24.04 2026-01"

  flavor:
    type: string
    default: "gp1.small"
    constraints:
      - allowed_values: ["gp1.small", "gp1.medium"]

  ssh_cidr:
    type: string
    default: "141.72.0.0/16"
    constraints:
      - allowed_pattern: '^(\d{1,3}\.){3}\d{1,3}/\d{1,2}$'

  stack_label:
    type: string
    default: "ansible"
    constraints:
      - allowed_pattern: '^[a-z0-9][a-z0-9-]{0,30}$'

  # Plattform-fest — wird vom Backend automatisch gesetzt, nicht in app.yaml exponieren
  network:
    type: string
    default: "NAT"
    constraints:
      - allowed_values: ["NAT"]

  external_network:
    type: string
    default: "DHBW"
    constraints:
      - allowed_values: ["DHBW"]

  key_name:
    type: string
    # Kein Default — Backend setzt immer ANSIBLE_SSH_KEY_NAME aus den Settings

resources:
  secgroup:
    type: OS::Neutron::SecurityGroup
    properties:
      description: SSH + ICMP aus erlaubtem CIDR
      rules:
        - direction: ingress
          protocol: tcp
          port_range_min: 22
          port_range_max: 22
          remote_ip_prefix: { get_param: ssh_cidr }
        - direction: ingress
          protocol: icmp
          remote_ip_prefix: { get_param: ssh_cidr }

  port:
    type: OS::Neutron::Port
    properties:
      network: { get_param: network }
      security_groups:
        - { get_resource: secgroup }

  server:
    type: OS::Nova::Server
    properties:
      name:
        str_replace:
          template: "dozilab-LABEL"
          params:
            LABEL: { get_param: stack_label }
      image:    { get_param: image }
      flavor:   { get_param: flavor }
      key_name: { get_param: key_name }
      networks:
        - port: { get_resource: port }

  fip:
    type: OS::Neutron::FloatingIP
    properties:
      floating_network: { get_param: external_network }

  fip_assoc:
    type: OS::Neutron::FloatingIPAssociation
    properties:
      floatingip_id: { get_resource: fip }
      port_id:       { get_resource: port }

outputs:
  floating_ip:
    value: { get_attr: [fip, floating_ip_address] }

  server_id:
    value: { get_resource: server }

