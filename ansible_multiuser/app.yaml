app:
  name: ansible-multiuser
  label: Ansible Multi-User Ubuntu
  version: 2.0.0
  description: >
    Ubuntu VM mit mehreren Benutzerkonten, verwaltet durch Ansible.
    Pro Gruppe wird ein Linux-Account mit eigenem Arbeitsverzeichnis erstellt.
  owner_team: dozilab-app-team

  # Erlaubt Lehrern im Deployment-Wizard eigene Dateien hochzuladen.
  # z.B. Aufgabenstellung oder gruppenspezifische Materialien.
  allow_user_files: true

# ------------------------------------------------------------------------------
# Parameter
# ------------------------------------------------------------------------------
parameters:

  # --- Schritt 1: Template ---

  - name: stack_label
    label: Stack-Label
    step: template
    type: string
    default: ansible
    required: true
    description: "Kurzes Label für diesen Stack (z.B. kurs-ws2026)."

  # --- Schritt 2: Konfiguration ---

  - name: image
    label: Betriebssystem-Image
    step: konfiguration
    type: string
    default: "Ubuntu 22.04 2025-01"
    required: true
    enum:
      - "Ubuntu 22.04 2025-01"
      - "Ubuntu 24.04 2025-01"
      - "Ubuntu 24.04 2026-01"

  - name: flavor
    label: VM-Größe (Flavor)
    step: konfiguration
    type: string
    default: "gp1.small"
    required: true
    enum:
      - "gp1.small"    # 2 vCPU, 4 GB RAM
      - "gp1.medium"   # 4 vCPU, 8 GB RAM

  # --- Schritt 3: Netzwerk ---

  - name: ssh_cidr
    label: SSH-Zugriff (CIDR)
    step: netzwerk
    type: string
    default: "141.72.0.0/16"
    required: true
    description: "Nur dieses Netz darf per SSH zugreifen. Standard: DHBW/VPN."

  # --- Schritt 4: Zugriff ---

  - name: force_password_change
    label: Passwort-Änderung beim ersten Login erzwingen
    step: zugriff
    type: boolean
    default: true
    required: true

# ------------------------------------------------------------------------------
# Credentials
#
# Studenten bekommen einen Linux-Account für direkten SSH-Zugang.
# teacher.linux wird automatisch vom Backend generiert.
# ------------------------------------------------------------------------------
credentials:

  per_student:
    - linux:
        username: "{{ username }}"
        password: generate

  teacher:
    # teacher.linux automatisch vorhanden — kein Eintrag nötig

# ------------------------------------------------------------------------------
# User Files
#
# Schritt 5 im Deployment-Wizard zeigt Upload-Felder für diese Dateien.
# ------------------------------------------------------------------------------
user_files:
  - name:        aufgabe_pdf
    label:       "Aufgabenstellung (PDF)"
    description: "Wird auf alle VMs kopiert — gleiche Aufgabe für alle Gruppen."
    required:    false
    accept:      "*.pdf"
    destination: /opt/dozilab/user-files/aufgabe.pdf
    mode:        all_stacks

  - name:        material_gruppe
    label:       "Gruppenmaterial"
    description: "Pro Gruppe eigene Dateien — z.B. unterschiedliche Datensätze oder Aufgaben."
    required:    false
    accept:      "*"
    destination: /opt/dozilab/user-files/{{ group_name }}/material
    mode:        per_group

# ------------------------------------------------------------------------------
# Outputs
# ------------------------------------------------------------------------------
outputs:
  - name: floating_ip
    label: Floating IP
    from_heat_output: floating_ip

  - name: server_id
    label: Server ID
    from_heat_output: server_id
