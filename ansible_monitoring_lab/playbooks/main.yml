                      "lineWidth": 1,
                      "pointSize": 5,
                      "showPoints": "never"
                    },
                    "mappings": [],
                    "unit": "short"
                  },
                  "overrides": []
                },
                "gridPos": { "h": 9, "w": 12, "x": 0, "y": 8 },
                "id": 4,
                "options": {
