---
- name: DoziLab Monitoring Lab Setup
  hosts: all
  remote_user: ubuntu
  become: true

  vars:
    dozilab_mark_dir: /var/lib/dozilab
    monitoring_lab_dir: /opt/dozilab/monitoring-lab
    monitoring_lab_app_name: ansible-monitoring-lab

  tasks:
    - name: Stack-Label validieren
      assert:
        that:
          - stack_label | default('monitoring') is match('^[a-z0-9][a-z0-9-]{0,30}$')
        fail_msg: "stack_label muss ^[a-z0-9][a-z0-9-]{0,30}$ erfuellen."

    - name: Monitoring Backend-Credentials validieren
      assert:
        that:
          - teacher.linux is defined
          - teacher.linux.username is defined
          - teacher.linux.password is defined
          - teacher.linux.password | length > 0
          - deployment_groups is defined
          - deployment_groups | length > 0
        fail_msg: "Backend-Credentials fehlen. Erwartet werden teacher.linux und deployment_groups[].linux."
      no_log: true

    - name: Monitoring Gruppen-Credentials validieren
      assert:
        that:
          - item.linux is defined
          - item.linux.username is defined
          - item.linux.username is match('^[a-z_][a-z0-9_-]{0,31}$')
          - item.linux.password is defined
          - item.linux.password | length > 0
          - item.email is defined
          - "'@' in item.email"
        fail_msg: "Ungueltige Monitoring Gruppen-Credentials."
      loop: "{{ deployment_groups | default([]) }}"
      no_log: true

    - name: DoziLab und Monitoring-Verzeichnisse erstellen
      file:
        path: "{{ item.path }}"
        state: directory
        owner: "{{ item.owner }}"
        group: "{{ item.group }}"
        mode: "{{ item.mode }}"
      loop:
        - { path: "{{ dozilab_mark_dir }}", owner: root, group: root, mode: "0755" }
        - { path: "/opt/dozilab", owner: root, group: root, mode: "0755" }
        - { path: "{{ monitoring_lab_dir }}", owner: ubuntu, group: ubuntu, mode: "0755" }
        - { path: "{{ monitoring_lab_dir }}/prometheus", owner: ubuntu, group: ubuntu, mode: "0755" }
        - { path: "{{ monitoring_lab_dir }}/grafana/provisioning/datasources", owner: ubuntu, group: ubuntu, mode: "0755" }
        - { path: "{{ monitoring_lab_dir }}/grafana/provisioning/dashboards", owner: ubuntu, group: ubuntu, mode: "0755" }
        - { path: "{{ monitoring_lab_dir }}/grafana/dashboards", owner: ubuntu, group: ubuntu, mode: "0755" }

    - name: Gruppen-Linux-Accounts erstellen
      user:
        name: "{{ item.linux.username }}"
        shell: /bin/bash
        create_home: true
        state: present
      loop: "{{ deployment_groups | default([]) }}"
      no_log: true

    - name: Gruppen-Linux-Passwoerter setzen
      shell: "echo '{{ item.linux.username }}:{{ item.linux.password }}' | chpasswd"
      loop: "{{ deployment_groups | default([]) }}"
      no_log: true

    - name: Docker installieren
      apt:
        name:
          - docker.io
          - python3
        state: present
        update_cache: true
        cache_valid_time: 3600

    - name: Docker Compose installieren
      shell: |
        set -euo pipefail
        export DEBIAN_FRONTEND=noninteractive

        if docker compose version >/dev/null 2>&1 || command -v docker-compose >/dev/null 2>&1; then
          echo "compose already installed"
          exit 0
        fi

        apt-get update

        for pkg in docker-compose-v2 docker-compose-plugin docker-compose; do
          if apt-cache show "$pkg" >/dev/null 2>&1; then
            apt-get install -y "$pkg"
            echo "installed $pkg"
            exit 0
          fi
        done

        echo "No Docker Compose package available via apt" >&2
        exit 1
      args:
        executable: /bin/bash
      register: compose_install
      changed_when: "'installed ' in compose_install.stdout"

    - name: Docker aktivieren und starten
      service:
        name: docker
        state: started
        enabled: true

    - name: Ubuntu User zur Docker-Gruppe hinzufuegen
      user:
        name: ubuntu
        groups: docker
        append: true

    - name: Docker Compose Befehl ermitteln
      shell: |
        set -euo pipefail
        if docker compose version >/dev/null 2>&1; then
          echo "docker compose"
        elif command -v docker-compose >/dev/null 2>&1; then
          echo "docker-compose"
        else
          echo "Docker Compose not available" >&2
          exit 1
        fi
      args:
        executable: /bin/bash
      register: docker_compose_command
      changed_when: false

    - name: Prometheus Konfiguration schreiben
      copy:
        dest: "{{ monitoring_lab_dir }}/prometheus/prometheus.yml"
        owner: ubuntu
        group: ubuntu
        mode: "0644"
        content: |
          global:
            scrape_interval: 15s

          scrape_configs:
            - job_name: prometheus
              static_configs:
                - targets:
                    - prometheus:9090

            - job_name: node
              static_configs:
                - targets:
                    - node-exporter:9100

    - name: Grafana Datasource schreiben
      copy:
        dest: "{{ monitoring_lab_dir }}/grafana/provisioning/datasources/prometheus.yml"
        owner: ubuntu
        group: ubuntu
        mode: "0644"
        content: |
          apiVersion: 1

          datasources:
            - name: Prometheus
              uid: Prometheus
              type: prometheus
              access: proxy
              url: http://prometheus:9090
              isDefault: true
              editable: true

    - name: Grafana Dashboard Provider schreiben
      copy:
        dest: "{{ monitoring_lab_dir }}/grafana/provisioning/dashboards/default.yml"
        owner: ubuntu
        group: ubuntu
        mode: "0644"
        content: |
          apiVersion: 1

          providers:
            - name: DoziLab
              orgId: 1
              folder: DoziLab
              type: file
              disableDeletion: false
              editable: true
              options:
                path: /var/lib/grafana/dashboards

    - name: Grafana Dashboard schreiben
      copy:
        dest: "{{ monitoring_lab_dir }}/grafana/dashboards/dozilab-node.json"
        owner: ubuntu
        group: ubuntu
        mode: "0644"
        content: |
          {
            "annotations": {
              "list": [
                {
                  "builtIn": 1,
                  "datasource": {
                    "type": "grafana",
                    "uid": "-- Grafana --"
                  },
                  "enable": true,
                  "hide": true,
                  "iconColor": "rgba(0, 211, 255, 1)",
                  "name": "Annotations & Alerts",
                  "type": "dashboard"
                }
              ]
            },
            "editable": true,
            "fiscalYearStartMonth": 0,
            "graphTooltip": 0,
            "links": [],
            "liveNow": false,
            "panels": [
              {
                "datasource": {
                  "type": "prometheus",
                  "uid": "Prometheus"
                },
                "fieldConfig": {
                  "defaults": {
                    "color": {
                      "mode": "thresholds"
                    },
                    "mappings": [],
                    "thresholds": {
                      "mode": "absolute",
                      "steps": [
                        { "color": "green", "value": null },
                        { "color": "orange", "value": 70 },
                        { "color": "red", "value": 90 }
                      ]
                    },
                    "unit": "percent"
                  },
                  "overrides": []
                },
                "gridPos": { "h": 8, "w": 8, "x": 0, "y": 0 },
                "id": 1,
                "options": {
                  "reduceOptions": {
                    "calcs": ["lastNotNull"],
                    "fields": "",
                    "values": false
                  }
                },
                "pluginVersion": "11.5.0",
                "targets": [
                  {
                    "datasource": {
                      "type": "prometheus",
                      "uid": "Prometheus"
                    },
                    "expr": "100 - (avg by (instance) (rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100)",
                    "legendFormat": "CPU",
                    "refId": "A"
                  }
                ],
                "title": "CPU-Auslastung",
                "type": "gauge"
              },
              {
                "datasource": {
                  "type": "prometheus",
                  "uid": "Prometheus"
                },
                "fieldConfig": {
                  "defaults": {
                    "color": {
                      "mode": "thresholds"
                    },
                    "mappings": [],
                    "thresholds": {
                      "mode": "absolute",
                      "steps": [
                        { "color": "green", "value": null },
                        { "color": "orange", "value": 70 },
                        { "color": "red", "value": 90 }
                      ]
                    },
                    "unit": "percent"
                  },
                  "overrides": []
                },
                "gridPos": { "h": 8, "w": 8, "x": 8, "y": 0 },
                "id": 2,
                "options": {
                  "reduceOptions": {
                    "calcs": ["lastNotNull"],
                    "fields": "",
                    "values": false
                  }
