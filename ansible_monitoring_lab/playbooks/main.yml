                    "expr": "(1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100",
                    "legendFormat": "RAM",
                    "refId": "A"
                  }
                ],
                "title": "Speicherverbrauch",
                "type": "gauge"
              },
              {
                "datasource": {
                  "type": "prometheus",
                  "uid": "Prometheus"
                },
                "fieldConfig": {
                  "defaults": {
                    "color": {
                      "mode": "thresholds"
                    },
                    "mappings": [],
                    "thresholds": {
                      "mode": "absolute",
                      "steps": [
                        { "color": "green", "value": null },
                        { "color": "orange", "value": 70 },
                        { "color": "red", "value": 90 }
                      ]
                    },
                    "unit": "percent"
                  },
                  "overrides": []
