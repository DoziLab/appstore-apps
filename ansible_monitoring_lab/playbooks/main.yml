    - name: Docker Compose Datei schreiben
      copy:
        dest: "{{ monitoring_lab_dir }}/docker-compose.yml"
        owner: ubuntu
        group: ubuntu
        mode: "0644"
        content: |
          services:
            prometheus:
              image: prom/prometheus:v3.1.0
              container_name: dozilab-prometheus
              restart: unless-stopped
              command:
                - "--config.file=/etc/prometheus/prometheus.yml"
                - "--storage.tsdb.retention.time=7d"
              volumes:
                - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
                - prometheus-data:/prometheus

            node-exporter:
              image: prom/node-exporter:v1.8.2
              container_name: dozilab-node-exporter
              restart: unless-stopped
              pid: host
              command:
                - "--path.rootfs=/host"
              volumes:
                - /:/host:ro,rslave

            grafana:
              image: grafana/grafana:11.5.0
              container_name: dozilab-grafana
              restart: unless-stopped
              ports:
                - "80:3000"
              environment:
                GF_SECURITY_ADMIN_USER: "{{ teacher.linux.username }}"
                GF_SECURITY_ADMIN_PASSWORD: "{{ teacher.linux.password }}"
                GF_USERS_ALLOW_SIGN_UP: "false"
                GF_USERS_AUTO_ASSIGN_ORG: "false"
                GF_AUTH_ANONYMOUS_ENABLED: "false"
                GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/dozilab-node.json
              volumes:
                - grafana-data:/var/lib/grafana
                - ./grafana/provisioning:/etc/grafana/provisioning:ro
                - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
              depends_on:
                - prometheus

          volumes:
            prometheus-data:
            grafana-data:
      no_log: true

    - name: Monitoring Stack starten
      command: "{{ docker_compose_command.stdout }} up -d"
      args:
        chdir: "{{ monitoring_lab_dir }}"
      register: compose_up
      changed_when: "'Started' in compose_up.stdout or 'Created' in compose_up.stdout or 'Recreated' in compose_up.stdout or 'Pulling' in compose_up.stderr or 'Downloading' in compose_up.stderr"

    - name: Docker Service pruefen
      command: systemctl is-active --quiet docker
      changed_when: false

    - name: Grafana HTTP warten
      shell: |
        set -euo pipefail

        python3 - <<'PY'
        import sys
        import time
        import urllib.error
        import urllib.request

        url = "http://127.0.0.1/api/health"
        last_error = None

        for attempt in range(60):
            try:
                with urllib.request.urlopen(url, timeout=2) as response:
                    body = response.read().decode("utf-8", errors="ignore")
                    if response.status == 200 and "ok" in body.lower():
                        print(f"Grafana HTTP ready: {response.status}")
                        sys.exit(0)
            except urllib.error.HTTPError as err:
                last_error = f"HTTP {err.code}"
            except Exception as err:
                last_error = str(err)

            if attempt < 59:
                time.sleep(5)

        sys.exit(f"Grafana HTTP did not become ready: {last_error}")
        PY
      args:
        executable: /bin/bash
      changed_when: false

    - name: Grafana Gruppen-Setup JSON schreiben
      copy:
        dest: "{{ monitoring_lab_dir }}/grafana-groups.json"
        owner: root
        group: root
        mode: "0600"
        content: |
          {
            "admin": {
              "username": {{ teacher.linux.username | to_json }},
              "password": {{ teacher.linux.password | to_json }}
            },
            "groups": [
          {% for group in deployment_groups | default([]) %}
              {
                "org": {{ group.group_name | default(group.username) | to_json }},
                "login": {{ group.linux.username | to_json }},
                "email": {{ group.email | to_json }},
                "password": {{ group.linux.password | to_json }}
              }{% if not loop.last %},{% endif %}
          {% endfor %}
            ]
          }
      no_log: true

    - name: Grafana Gruppen und Benutzer einrichten
      shell: |
        set -euo pipefail

        python3 - <<'PY'
        import base64
        import json
        import time
        import urllib.error
        import urllib.parse
        import urllib.request
        from pathlib import Path

        setup = json.loads(Path("{{ monitoring_lab_dir }}/grafana-groups.json").read_text(encoding="utf-8"))
        dashboard = json.loads(Path("{{ monitoring_lab_dir }}/grafana/dashboards/dozilab-node.json").read_text(encoding="utf-8"))

        base = "http://127.0.0.1"
        admin_user = setup["admin"]["username"]
        admin_password = setup["admin"]["password"]
        auth = base64.b64encode(f"{admin_user}:{admin_password}".encode()).decode()

        def request(method, path, payload=None, org_id=None, allowed=(200, 201)):
            data = None
            headers = {
                "Authorization": f"Basic {auth}",
                "Content-Type": "application/json",
                "Accept": "application/json",
            }
            if org_id is not None:
                headers["X-Grafana-Org-Id"] = str(org_id)
            if payload is not None:
                data = json.dumps(payload).encode("utf-8")
            req = urllib.request.Request(base + path, data=data, headers=headers, method=method)
            try:
                with urllib.request.urlopen(req, timeout=10) as resp:
                    body = resp.read().decode("utf-8", errors="ignore")
                    if resp.status not in allowed:
                        raise RuntimeError(f"{method} {path} returned {resp.status}: {body}")
                    return json.loads(body) if body else {}
            except urllib.error.HTTPError as err:
                body = err.read().decode("utf-8", errors="ignore")
                if err.code in allowed:
                    return json.loads(body) if body else {}
                raise RuntimeError(f"{method} {path} returned {err.code}: {body}") from err

        def wait_ready():
            for _ in range(60):
                try:
                    health = request("GET", "/api/health", allowed=(200,))
                    if str(health.get("database", "")).lower() == "ok":
                        return
                except Exception:
                    pass
                time.sleep(2)
            raise RuntimeError("Grafana API did not become ready")

        def lookup_user(login_or_email):
            query = urllib.parse.quote(login_or_email, safe="")
            try:
                return request("GET", f"/api/users/lookup?loginOrEmail={query}", allowed=(200,))
            except RuntimeError as err:
                if "returned 404" in str(err):
                    return None
                raise

        def ensure_user(entry):
            existing = lookup_user(entry["login"])
            if existing:
                return existing["id"]
            created = request("POST", "/api/admin/users", {
                "name": entry["org"],
                "email": entry["email"],
                "login": entry["login"],
                "password": entry["password"],
            }, allowed=(200, 201))
            return created["id"]

        def get_org_by_name(name):
            query = urllib.parse.quote(name, safe="")
            try:
                return request("GET", f"/api/orgs/name/{query}", allowed=(200,))
            except RuntimeError as err:
                if "returned 404" in str(err):
                    return None
                raise

        def ensure_org(name):
            existing = get_org_by_name(name)
            if existing:
                return existing["id"]
            created = request("POST", "/api/orgs", {"name": name}, allowed=(200, 201))
            return created["orgId"]

        def ensure_org_user(org_id, login):
            users = request("GET", f"/api/orgs/{org_id}/users", allowed=(200,))
            for user in users:
                if user.get("login") == login:
                    request("PATCH", f"/api/orgs/{org_id}/users/{user['userId']}", {"role": "Editor"}, allowed=(200,))
                    return
            request("POST", f"/api/orgs/{org_id}/users", {"loginOrEmail": login, "role": "Editor"}, allowed=(200,))

        def ensure_datasource(org_id):
            datasources = request("GET", "/api/datasources", org_id=org_id, allowed=(200,))
            for ds in datasources:
                if ds.get("uid") == "Prometheus" or ds.get("name") == "Prometheus":
                    return
            request("POST", "/api/datasources", {
                "name": "Prometheus",
                "uid": "Prometheus",
                "type": "prometheus",
                "access": "proxy",
                "url": "http://prometheus:9090",
                "isDefault": True,
            }, org_id=org_id, allowed=(200, 201))

        def ensure_dashboard(org_id, org_name):
            model = dict(dashboard)
            model["id"] = None
            model["uid"] = "dozilab-node-overview"
            model["title"] = f"{org_name} - Node Overview"
            request("POST", "/api/dashboards/db", {
                "dashboard": model,
                "folderId": 0,
                "overwrite": True,
            }, org_id=org_id, allowed=(200,))

        wait_ready()
        for entry in setup["groups"]:
            org_name = f"DoziLab {entry['org']}"
            ensure_user(entry)
            org_id = ensure_org(org_name)
            ensure_org_user(org_id, entry["login"])
            ensure_datasource(org_id)
            ensure_dashboard(org_id, entry["org"])
            print(f"configured {entry['login']} in org {org_name}")
        PY
      args:
        executable: /bin/bash
      register: grafana_group_setup
      changed_when: true
      no_log: true

    - name: Monitoring Container pruefen
      shell: |
        set -euo pipefail

        for name in dozilab-grafana dozilab-prometheus dozilab-node-exporter; do
          state="$(docker inspect -f '{% raw %}{{.State.Running}}{% endraw %}' "$name")"
          if [ "$state" != "true" ]; then
            echo "$name is not running" >&2
            exit 1
          fi
        done

        echo "Monitoring containers running"
      args:
        executable: /bin/bash
      changed_when: false

    - name: Ready Marker schreiben
      copy:
        dest: "{{ dozilab_mark_dir }}/ready"
        owner: root
        group: root
        mode: "0644"
        content: |
          DOZILAB_READY app={{ monitoring_lab_app_name }} stack={{ stack_label | default('monitoring') }} project={{ monitoring_lab_dir }}
