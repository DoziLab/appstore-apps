#cloud-config
package_update: true
package_upgrade: false

packages:
  - docker.io
  - nginx
  - curl

write_files:
  - path: /etc/dozilab/user.json.payload
    owner: root:root
    permissions: "0600"
    content: |
      __USER_JSON__

  - path: /usr/local/bin/dozilab-juice-shop-setup.sh
    owner: root:root
    permissions: "0755"
    content: |
      #!/usr/bin/env bash
      set -euo pipefail

      STACK_LABEL="__STACK_LABEL__"
      LOG="/var/log/dozilab-juice-shop.log"
      MARK_DIR="/var/lib/dozilab"
      READY_FILE="${MARK_DIR}/ready"
      FAILED_FILE="${MARK_DIR}/failed"
      IMAGE="bkimminich/juice-shop:latest"
      CONTAINER="dozilab-juice-shop"

      mkdir -p "$MARK_DIR" /etc/dozilab
      exec > >(tee -a "$LOG" /var/log/cloud-init-output.log) 2>&1

      on_fail() {
        rc=$?
        msg="DOZILAB_FAILED stack=${STACK_LABEL} rc=${rc} time=$(date -Is)"
        echo "$msg" | tee /dev/console > "$FAILED_FILE"
        chmod 644 "$FAILED_FILE" || true
        exit "$rc"
      }
      trap on_fail ERR

      echo "juice shop setup started $(date -Is)"

      if [[ -s /etc/dozilab/user.json.payload ]]; then
        bytes="$(wc -c </etc/dozilab/user.json.payload)"
        echo "user_json payload stored (${bytes} bytes)"
      fi

      systemctl enable --now docker

      docker pull "$IMAGE"
      docker rm -f "$CONTAINER" >/dev/null 2>&1 || true
      docker run \
        --detach \
        --name "$CONTAINER" \
        --restart unless-stopped \
        --publish 127.0.0.1:3000:3000 \
        "$IMAGE"

      cat >/etc/nginx/sites-available/dozilab-juice-shop <<'EOF'
      server {
          listen 80 default_server;
          server_name _;

          location / {
              proxy_pass http://127.0.0.1:3000;
              proxy_http_version 1.1;
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $scheme;
              proxy_set_header Upgrade $http_upgrade;
              proxy_set_header Connection "upgrade";
              proxy_read_timeout 300;
          }
      }
      EOF

      rm -f /etc/nginx/sites-enabled/default
      ln -sf /etc/nginx/sites-available/dozilab-juice-shop /etc/nginx/sites-enabled/dozilab-juice-shop
      nginx -t
      systemctl restart nginx

      for _ in $(seq 1 60); do
        if curl -fsS http://127.0.0.1:3000 >/dev/null; then
          break
        fi
        sleep 5
      done

      curl -fsS http://127.0.0.1:3000 >/dev/null
      curl -fsS http://127.0.0.1 >/dev/null

      cat >/etc/motd <<EOF
      DoziLab OWASP Juice Shop Lab
      Stack: ${STACK_LABEL}
      Web: http://<floating_ip>/
      EOF

      msg="DOZILAB_READY stack=${STACK_LABEL} time=$(date -Is)"
      echo "$msg" | tee /dev/console > "$READY_FILE"
      chmod 644 "$READY_FILE"
      echo "juice shop setup finished $(date -Is)"

runcmd:
  - [ bash, -lc, "/usr/local/bin/dozilab-juice-shop-setup.sh" ]

final_message: "DoziLab OWASP Juice Shop Lab: cloud-init finished"
