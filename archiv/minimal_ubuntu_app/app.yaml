app:
  name: minimal-ubuntu-app
  label: Minimal Ubuntu Beispiel-App
  version: 1.0.0
  description: >
    Kleine Beispiel-App fuer eigene DoziLab Apps. Deployt eine einfache Ubuntu-VM
    und zeigt die minimale Struktur aus app.yaml, Heat Template, cloud-init und
    Outputs.
  owner_team: dozilab-app-team

artifacts:
  heat_template: heat/main.yaml
  cloud_init: cloud-init/user-data.yaml

parameters:
  - name: stack_label
    label: Label
    step: template
    type: string
    default: "minimal"
    required: true
    description: "Kurzes Label fuer VM-Namen und Log-Marker."

  - name: image
    label: Image
    step: konfiguration
    type: string
    default: "Ubuntu 22.04 2025-01"
    enum:
      - "Ubuntu 22.04 2025-01"
      - "Ubuntu 24.04 2025-01"
      - "Ubuntu 24.04 2026-01"
    required: true
    description: "Ubuntu Image fuer die VM."

  - name: flavor
    label: Flavor
    step: konfiguration
    type: string
    default: "gp1.small"
    enum:
      - "gp1.small"
      - "gp1.medium"
    required: true
    description: "Groesse der VM."

  - name: ssh_cidr
    label: SSH erlaubtes Netz (CIDR)
    step: netzwerk
    type: string
    default: "141.72.0.0/16"
    required: true
    description: "CIDR, aus dem SSH erlaubt ist."

  - name: network
    label: Internes Netzwerk
    step: netzwerk
    type: string
    default: "NAT"
    hidden: true
    description: "Internes Netzwerk."

  - name: external_network
    label: Externes Netzwerk
    step: netzwerk
    type: string
    default: "DHBW"
    hidden: true
    description: "Netz fuer Floating IPs."

  - name: key_name
    label: SSH-Key
    step: zugriff
    type: string
    default: "heat-bastion-key"
    hidden: true
    description: "SSH-Key fuer Admin-Zugriff."

outputs:
  - name: ssh_user
    from_heat_output: ssh_user
    description: "SSH username."

  - name: floating_ip
    from_heat_output: floating_ip
    description: "Floating IP der VM."

  - name: private_ip
    from_heat_output: private_ip
    description: "Private IP der VM."

  - name: server_id
    from_heat_output: server_id
    description: "Nova Server ID."

  - name: ssh_hint
    from_heat_output: ssh_hint
    description: "SSH Beispielbefehl."

  - name: ready_marker
    from_heat_output: ready_marker
    description: "Marker im Console Log, wenn cloud-init fertig ist."
